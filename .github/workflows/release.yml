name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run build
        working-directory: web
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features

  test-rust:
    name: Test + Coverage (Rust)
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          set +e
          COVERAGE_OUTPUT=$(cargo llvm-cov --workspace 2>&1)
          LLVM_COV_EXIT=$?
          set -e
          echo "$COVERAGE_OUTPUT"
          if [ $LLVM_COV_EXIT -ne 0 ]; then
            echo "::error::cargo llvm-cov failed with exit code $LLVM_COV_EXIT"
            exit $LLVM_COV_EXIT
          fi
          TOTAL_LINE=$(echo "$COVERAGE_OUTPUT" | grep "^TOTAL")
          COVERAGE_PCT=$(echo "$TOTAL_LINE" | awk '{
            for (i=NF; i>=1; i--) {
              if ($i ~ /^[0-9]+\.[0-9]+%$/) {
                gsub(/%/, "", $i)
                print $i
                exit
              }
            }
          }')
          echo "Backend line coverage: ${COVERAGE_PCT}%"
          if [ "$(echo "$COVERAGE_PCT < 80" | bc -l)" = "1" ]; then
            echo "::error::Backend coverage ${COVERAGE_PCT}% is below 80% threshold"
            exit 1
          fi

  test-web:
    name: Test + Coverage (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run typecheck
        working-directory: web
      - name: Run tests with coverage (thresholds in vite.config.ts)
        run: bun run test:coverage
        working-directory: web

  build:
    name: Build (${{ matrix.target }})
    needs: [lint, test-rust, test-web]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build server
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p zremote-server
          else
            cargo build --release --target ${{ matrix.target }} -p zremote-server
          fi

      - name: Build agent
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p zremote-agent
          else
            cargo build --release --target ${{ matrix.target }} -p zremote-agent
          fi

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/zremote-server dist/
          cp target/${{ matrix.target }}/release/zremote-agent dist/
          cd dist && tar czf ../zremote-${{ matrix.target }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: zremote-${{ matrix.target }}.tar.gz
          retention-days: 1

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum zremote-*.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            zremote-*.tar.gz
            SHA256SUMS

  update-latest:
    name: Update Latest Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum zremote-*.tar.gz > SHA256SUMS

      - name: Delete existing latest release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true

      - name: Create latest tag
        run: |
          git tag -d latest || true
          git tag latest
          git push origin latest

      - name: Create latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Latest Release (${{ github.ref_name }})" \
            --notes "Automatically updated to ${{ github.ref_name }}. For changelog see the [versioned release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})." \
            --latest=false \
            zremote-*.tar.gz SHA256SUMS
