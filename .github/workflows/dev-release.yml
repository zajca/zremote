name: Dev Release (GPUI)

on:
  push:
    branches: [feat/gpui-client]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-gui:
    name: Build GPUI Client (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: gui-x86_64-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libfreetype-dev libfontconfig-dev \
            libwayland-dev wayland-protocols \
            libvulkan-dev \
            libasound2-dev \
            cmake

      - name: Build GPUI client (release)
        run: cargo build --release -p zremote-gui

      - name: Build server + agent (release)
        run: cargo build --release -p zremote-server -p zremote-agent

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/zremote-gui dist/
          cp target/release/zremote-server dist/
          cp target/release/zremote-agent dist/
          cd dist && tar czf ../zremote-dev-x86_64-linux.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: build-x86_64-linux
          path: zremote-dev-x86_64-linux.tar.gz
          retention-days: 5

  dev-release:
    name: Update Dev Release
    needs: build-gui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum zremote-dev-*.tar.gz > SHA256SUMS

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete dev --yes 2>/dev/null || true

      - name: Delete existing dev tag
        run: git push origin :refs/tags/dev 2>/dev/null || true

      - name: Create dev tag
        run: |
          git tag -f dev
          git push origin dev --force

      - name: Create dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          gh release create dev \
            --title "Dev Build ($SHORT_SHA)" \
            --notes "Automated dev build from \`feat/gpui-client\` branch.

          **Commit:** ${{ github.sha }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Contains: \`zremote-gui\`, \`zremote-server\`, \`zremote-agent\` (x86_64-linux)." \
            --prerelease \
            zremote-dev-*.tar.gz SHA256SUMS
